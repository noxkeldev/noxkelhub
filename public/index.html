<!DOCTYPE html>
<html>
<head>
    <title>NoxKel RPG</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="auth-box">
        <h2>NoxKel Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="sendAuth('signup')">Sign Up</button>
        <button onclick="sendAuth('login')">Login</button>
    </div>

    <div id="game-hub" style="display:none; text-align: center; margin-top: 50px;">
        <h2>NoxKel Game Hub</h2>
        <p style="color: #fff; margin-bottom: 20px;">Ready to drop into the city, soldier?</p>
        <button onclick="pressJoinButton()" style="background: #28a745; color: white; padding: 15px 30px; font-size: 18px; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">
            JOIN GAME
        </button>
    </div>

    <div id="game-ui" style="display:none;">
        <h1>Welcome to the Game!</h1>
        <button onclick="teleportToSpawn()" style="background: red; color: white; padding: 10px; margin-bottom: 10px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold;">🚨 I'm Stuck! (Respawn)</button>
        <div id="phaser-game"></div> 
    </div>

    <script src="game.js"></script>
</body>
</html>
