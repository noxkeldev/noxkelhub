<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOXKEL HUB</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #0d0f12; color: #a3afbe; height: 100vh; display: flex; overflow: hidden; }

        /* AUTH SCREEN */
        #auth-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0d0f12; display: flex; justify-content: center; align-items: center; z-index: 999; }
        .auth-box { background: #161920; padding: 30px; border-radius: 6px; width: 350px; text-align: center; border: 1px solid #232a36; }
        .auth-box h2 { color: #fff; margin-bottom: 12px; font-size: 24px; letter-spacing: 1px; }
        .auth-box input { width: 100%; padding: 10px; background: #0d0f12; border: 1px solid #232a36; border-radius: 4px; color: #fff; margin-bottom: 12px; outline: none; }
        .auth-box button { width: 100%; padding: 10px; background: #00ffcc; color: #0d0f12; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .secondary-btn { background: transparent !important; color: #a3afbe !important; margin-top: 10px; cursor: pointer; border: none; font-size: 12px; text-decoration: underline; }

        /* MODAL OVERLAYS (Replaces old browser prompts) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.75); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-card { background: #161920; border: 1px solid #232a36; padding: 25px; border-radius: 8px; width: 400px; display: flex; flex-direction: column; gap: 14px; }
        .modal-card h3 { color: #fff; font-size: 18px; }
        .modal-card label { font-size: 12px; color: #728296; text-transform: uppercase; font-weight: bold; }
        .modal-card input, .modal-card select { width: 100%; padding: 10px; background: #0d0f12; border: 1px solid #232a36; border-radius: 4px; color: #fff; outline: none; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .modal-btn { padding: 8px 16px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: #00ffcc; color: #0d0f12; }
        .btn-cancel { background: #232a36; color: #a3afbe; }

        /* CORE GRID DECK CONTROL */
        #app-container { display: none; width: 100vw; height: 100vh; }

        /* Col 1: Server Rail */
        .rail-servers { width: 70px; background: #0d0f12; display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 12px; border-right: 1px solid #161920; }
        .srv-node { width: 46px; height: 46px; background: #161920; border-radius: 6px; display: flex; justify-content: center; align-items: center; color: #00ffcc; font-weight: bold; cursor: pointer; border: 1px solid #232a36; font-size: 14px; transition: 0.2s; }
        .srv-node:hover, .srv-node.active { background: #00ffcc; color: #0d0f12; border-radius: 12px; }
        .rail-action-btn { font-size: 18px; color: #728296; border-style: dashed; }
        .rail-action-btn:hover { color: #fff; border-color: #fff; }

        /* Col 2: Channels Sub-bar */
        .sidebar-channels { width: 220px; background: #12161f; display: flex; flex-direction: column; border-right: 1px solid #161920; }
        .sidebar-header { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-weight: bold; color: #fff; border-bottom: 1px solid #161920; font-size: 14px; }
        .add-room-trigger { font-size: 18px; color: #728296; cursor: pointer; font-weight: normal; }
        .add-room-trigger:hover { color: #00ffcc; }
        .channel-list { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; }
        .ch-item { padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; color: #728296; display: flex; align-items: center; justify-content: space-between; }
        .ch-item:hover, .ch-item.active { background: #161920; color: #fff; }
